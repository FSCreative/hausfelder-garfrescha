name: Fonts lokal einbinden (DSGVO)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fonts herunterladen
        run: node scripts/fetch-fonts.mjs
      - name: Fonts committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/fonts
          git diff --cached --quiet || git commit -m "Google Fonts lokal eingebunden (DSGVO)"
          git push
