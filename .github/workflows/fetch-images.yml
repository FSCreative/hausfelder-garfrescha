name: Bilder von Wix-Website importieren

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Bilder herunterladen
        run: node scripts/fetch-images.mjs
      - name: Bilder committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images public/files
          git diff --cached --quiet || git commit -m "Bilder der alten Website importiert"
          git push
